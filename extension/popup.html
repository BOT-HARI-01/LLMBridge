<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        width: 220px;
        padding: 15px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f9f9f9;
        text-align: center;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .status {
        font-size: 12px;
        color: #666;
        margin-bottom: 5px;
      }
      button {
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.2s, transform 0.1s;
      }
      button:active {
        transform: scale(0.98);
      }
      #connect {
        background-color: #007bff;
        color: white;
      }
      #connect:hover {
        background-color: #0056b3;
      }
      #stop {
        background-color: #dc3545;
        color: white;
      }
      #stop:hover {
        background-color: #a71d2a;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="status-text" class="status">Status: Disconnected</div>
      <button id="connect">Connect Native Host</button>
      <button id="stop" disabled>Turn Off Agent</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
